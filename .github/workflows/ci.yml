name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hng_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      POSTGRES_URI: postgresql://postgres:postgres@localhost:5432/hng_test
      POSTGRES_TEST_URI: postgresql://postgres:postgres@localhost:5432/hng_test
      JWT_SECRET: test_jwt_secret
      SESSION_SECRET: test_session_secret
      GITHUB_CLIENT_ID: test_client_id
      GITHUB_CLIENT_SECRET: test_client_secret
      GITHUB_CALLBACK_URL: http://localhost:3000/auth/github/callback
      GITHUB_LOGIN_REDIRECT_URL: https://github.com/login/oauth/authorize
      GITHUB_ACCESS_TOKEN_URL: https://github.com/login/oauth/access_token
      GITHUB_USER_API_URL: https://api.github.com/user
      GITHUB_STATE_STRING: test_state_string
      GENDERIZE_API_URL: https://api.genderize.io
      AGIFY_API_URL: https://api.agify.io
      NATIONALIZE_API_URL: https://api.nationalize.io
      API_VERSION: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations 
        run: npm run migrate
      - name: Run tests
        run: npm test

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for syntax errors
        run: npm run build:check